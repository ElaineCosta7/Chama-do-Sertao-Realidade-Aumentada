<html>
<head>
  <title>Realidade Aumentada usando AR.js e A-frame com modelo 3D e marcador próprio</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="debugUIEnabled: false">

    <a-assets>
      <a-asset-item
        id="lamparina"
        src="Lamparina-Animada-fogo.glb">
      </a-asset-item>
    </a-assets>

    <a-marker
      type="pattern"
      url="pattern-Fogo.patt">

      <a-entity
        id="modelo3d"
        gltf-model="#lamparina"
        animation-mixer="loop: repeat"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.5 0.5 0.5">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
