<html>
  <head>
    <title>Realidade Aumentada usando AR.js e A-frame com modelo 3D e marcador próprio</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: true" embedded arjs="debugUIEnabled: true">
      <a-marker type="pattern" url="pattern-Fogo.patt">
      <a-assets>
        <a-asset-item id="lamparina" src="Lamparina-Animada-fogo.glb"></a-asset-item>
      </a-assets>
      <a-marker preset="Fogo.png">
        <a-entity 
          id="modelo3d" 
          position="0 0 0" 
          rotation="90 0 0" 
          scale="0.5 0.5 0.5"
          gltf-model="#lamparina">          
        </a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
